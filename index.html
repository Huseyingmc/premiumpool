<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Document</title>
     <style>
          @import url(https://fonts.googleapis.com/css?family=Quattrocento+Sans);

          .loading {
               position: fixed;
               top: 0;
               left: 0;
               width: 100%;
               height: 100%;
               background: #3879BD;
               z-index: 9999;
          }

          .loading-text {
               position: absolute;
               top: 0;
               bottom: 0;
               left: 0;
               right: 0;
               margin: auto;
               text-align: center;
               width: 100%;
               height: 100px;
               line-height: 100px;
          }

          .loading-text span {
               display: inline-block;
               margin: 0 5px;
               color: #fff;
               font-family: "Quattrocento Sans", sans-serif;
          }

          .loading-text span:nth-child(1) {
               filter: blur(0px);
               -webkit-animation: blur-text 1.5s 0s infinite linear alternate;
               animation: blur-text 1.5s 0s infinite linear alternate;
          }

          .loading-text span:nth-child(2) {
               filter: blur(0px);
               -webkit-animation: blur-text 1.5s 0.2s infinite linear alternate;
               animation: blur-text 1.5s 0.2s infinite linear alternate;
          }

          .loading-text span:nth-child(3) {
               filter: blur(0px);
               -webkit-animation: blur-text 1.5s 0.4s infinite linear alternate;
               animation: blur-text 1.5s 0.4s infinite linear alternate;
          }

          .loading-text span:nth-child(4) {
               filter: blur(0px);
               -webkit-animation: blur-text 1.5s 0.6s infinite linear alternate;
               animation: blur-text 1.5s 0.6s infinite linear alternate;
          }

          .loading-text span:nth-child(5) {
               filter: blur(0px);
               -webkit-animation: blur-text 1.5s 0.8s infinite linear alternate;
               animation: blur-text 1.5s 0.8s infinite linear alternate;
          }

          .loading-text span:nth-child(6) {
               filter: blur(0px);
               -webkit-animation: blur-text 1.5s 1s infinite linear alternate;
               animation: blur-text 1.5s 1s infinite linear alternate;
          }

          .loading-text span:nth-child(7) {
               filter: blur(0px);
               -webkit-animation: blur-text 1.5s 1.2s infinite linear alternate;
               animation: blur-text 1.5s 1.2s infinite linear alternate;
          }

          @-webkit-keyframes blur-text {
               0% {
                    filter: blur(0px);
               }

               100% {
                    filter: blur(4px);
               }
          }

          @keyframes blur-text {
               0% {
                    filter: blur(0px);
               }

               100% {
                    filter: blur(4px);
               }
          }
     </style>
</head>

<body>
     <div class="loading">
          <div class="loading-text">
               <span class="loading-text-words">Y</span>
               <span class="loading-text-words">A</span>
               <span class="loading-text-words">K</span>
               <span class="loading-text-words">I</span>
               <span class="loading-text-words">N</span>
               <span class="loading-text-words">D</span>
               <span class="loading-text-words">A</span>
          </div>
     </div>
     <div style="position: fixed; bottom: 10px; width: 100%; text-align: center; color: white; font-family: 'Quattrocento Sans', sans-serif; z-index: 10000; font-size: 14px; padding: 10px; box-sizing: border-box;">

  <span style="font-size: 11px; opacity: 0.8;">Konaklı, Necip Fazıl Kısakürek Cd 5-F, 07491 Alanya/Antalya</span>
 </div>
</body>

</html>
